<script>
    // Global Vars
    window.updateDashboard = null; window.changeRouteSmart = null;
    var dynamicLocations = {};

    function makeDraggable(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (document.getElementById(elmnt.id + "_header")) { document.getElementById(elmnt.id + "_header").onmousedown = dragMouseDown; }
        function dragMouseDown(e) { e = e || window.event; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
        function elementDrag(e) { e = e || window.event; e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
        function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
    }

    // ==========================================

    function getDistNM(lat1, lon1, lat2, lon2) {
        var R = 6371; var dLat = (lat2-lat1)*Math.PI/180; var dLon = (lon2-lon1)*Math.PI/180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); return R*c*0.539957; 
    }

    function getAIRoute(startLatLng, endLatLng) {
        if (getDistNM(startLatLng.lat, startLatLng.lng, endLatLng.lat, endLatLng.lng) < 60) {
            return [ [startLatLng.lat, startLatLng.lng], [endLatLng.lat, endLatLng.lng] ];
        }

        let nodes = Object.assign({}, seaNodes);
        nodes['START'] = {lat: startLatLng.lat, lng: startLatLng.lng};
        nodes['END'] = {lat: endLatLng.lat, lng: endLatLng.lng};

        let adj = {}; for(let key in nodes) adj[key] = [];
        
        seaEdges.forEach(e => {
            let d = getDistNM(nodes[e[0]].lat, nodes[e[0]].lng, nodes[e[1]].lat, nodes[e[1]].lng);
            adj[e[0]].push({node: e[1], weight: d}); adj[e[1]].push({node: e[0], weight: d});
        });

        let startNearest = Object.keys(seaNodes).map(k => ({id: k, dist: getDistNM(startLatLng.lat, startLatLng.lng, seaNodes[k].lat, seaNodes[k].lng)})).sort((a,b) => a.dist - b.dist);
        adj['START'].push({node: startNearest[0].id, weight: startNearest[0].dist}); adj[startNearest[0].id].push({node: 'START', weight: startNearest[0].dist});
        adj['START'].push({node: startNearest[1].id, weight: startNearest[1].dist}); adj[startNearest[1].id].push({node: 'START', weight: startNearest[1].dist});

        let endNearest = Object.keys(seaNodes).map(k => ({id: k, dist: getDistNM(endLatLng.lat, endLatLng.lng, seaNodes[k].lat, seaNodes[k].lng)})).sort((a,b) => a.dist - b.dist);
        adj['END'].push({node: endNearest[0].id, weight: endNearest[0].dist}); adj[endNearest[0].id].push({node: 'END', weight: endNearest[0].dist});
        adj['END'].push({node: endNearest[1].id, weight: endNearest[1].dist}); adj[endNearest[1].id].push({node: 'END', weight: endNearest[1].dist});

        let distances = {}; let prev = {}; let pq = [];
        for(let key in nodes) { distances[key] = Infinity; prev[key] = null; }
        distances['START'] = 0; pq.push({node: 'START', dist: 0});

        while(pq.length > 0) {
            pq.sort((a,b) => a.dist - b.dist); let current = pq.shift().node;
            if (current === 'END') break;

            adj[current].forEach(neighbor => {
                let alt = distances[current] + neighbor.weight;
                if (alt < distances[neighbor.node]) {
                    distances[neighbor.node] = alt; prev[neighbor.node] = current;
                    pq.push({node: neighbor.node, dist: alt});
                }
            });
        }

        let path = []; let curr = 'END';
        while(curr) { path.unshift([nodes[curr].lat, nodes[curr].lng]); curr = prev[curr]; }
        return path;
    }

                if (coords.length > 1) {
                    var cStart = coords[0]; var cEnd = coords[coords.length - 1];
                    var distAtoA = Math.abs(cStart[1] - startCoords.lat) + Math.abs(cStart[0] - startCoords.lng);
                    var distBtoB = Math.abs(cEnd[1] - endCoords.lat) + Math.abs(cEnd[0] - endCoords.lng);
                    var distAtoB = Math.abs(cStart[1] - endCoords.lat) + Math.abs(cStart[0] - endCoords.lng);
                    var distBtoA = Math.abs(cEnd[1] - startCoords.lat) + Math.abs(cEnd[0] - startCoords.lng);
                    
                    if (distAtoA < 0.05 && distBtoB < 0.05) { foundRoute = coords.map(c => [c[1], c[0]]); statusMsg = "✅ Rute Utama KML Terdeteksi."; break; } 
                    else if (distAtoB < 0.05 && distBtoA < 0.05) { var revCoords = coords.slice().reverse(); foundRoute = revCoords.map(c => [c[1], c[0]]); statusMsg = "✅ Rute Utama KML Terdeteksi (Reverse)."; break; }
                }
            }
        }

        // 2. Logic Branching 2 Waypoint Terakhir (Tangguh / Badak)
        if (!foundRoute) {
            var startName = startCoords.name.toLowerCase();
            var endName = endCoords.name.toLowerCase();

            var isTangguhStart = startName.includes("tangguh") || startName.includes("bintuni");
            var isBadakStart = startName.includes("badak") || startName.includes("bontang");
            var isBranchEnd = endName.includes("lampung") || endName.includes("jawa satu") || endName.includes("jsp") || endName.includes("priok");

            var isTangguhEnd = endName.includes("tangguh") || endName.includes("bintuni");
            var isBadakEnd = endName.includes("badak") || endName.includes("bontang");
            var isBranchStart = startName.includes("lampung") || startName.includes("jawa satu") || startName.includes("jsp") || startName.includes("priok");

            // Rute Berangkat (Dari Badak/Tangguh)
            if ((isTangguhStart || isBadakStart) && isBranchEnd) {
                var baseStr = isTangguhStart ? "tangguh to nr i" : "badak to fsru";
                var baseLine = dataKmlFaris.features.find(f => f.geometry.type === 'LineString' && f.properties.name && f.properties.name.toLowerCase() === baseStr);
                if (baseLine) {
                    var lineCoords = baseLine.geometry.coordinates.map(c => [c[1], c[0]]);
                    var branchRoute = lineCoords.slice(0, lineCoords.length - 2); // Potong 2 WP terakhir (NR & WP10)
                    branchRoute.push([endCoords.lat, endCoords.lng]); // Tarik ke FSRU/Port lain
                    foundRoute = branchRoute;
                    statusMsg = "🚢 Rute Branching Terpotong di Jalur Laut Utama.";
                }
            }
            // Rute Pulang (Menuju Badak/Tangguh)
            else if ((isTangguhEnd || isBadakEnd) && isBranchStart) {
                var baseStr = isTangguhEnd ? "tangguh to nr i" : "badak to fsru";
                var baseLine = dataKmlFaris.features.find(f => f.geometry.type === 'LineString' && f.properties.name && f.properties.name.toLowerCase() === baseStr);
                if (baseLine) {
                    var lineCoords = baseLine.geometry.coordinates.map(c => [c[1], c[0]]);
                    var branchRoute = lineCoords.slice(0, lineCoords.length - 2).reverse(); 
                    branchRoute.unshift([startCoords.lat, startCoords.lng]); 
                    foundRoute = branchRoute;
                    statusMsg = "🚢 Rute Menyatu ke Jalur Laut Utama (Reverse).";
                }
            }
        }

        // 3. Fallback to AI Sea Router (Dijkstra)
        var newCoords;
        if (foundRoute) { 
            newCoords = foundRoute; 
            document.getElementById('save_status').innerHTML = statusMsg; 
        } else { 
            newCoords = getAIRoute(startCoords, endCoords); 
            document.getElementById('save_status').innerHTML = "🤖 AI Sea Router Berjalan."; 
        }

        rebuildRoute(newCoords); window.updateDashboard();
        var group = new L.featureGroup(markersBlue); map.fitBounds(group.getBounds().pad(0.1));
    };

    function rebuildRoute(coordsArray) {
        for(var i=0; i<markersBlue.length; i++){ layerBlue.removeLayer(markersBlue[i]); }
        markersBlue.length = 0; 
        for(var i=0; i<coordsArray.length; i++){ 
            var lat = coordsArray[i].lat || coordsArray[i][0]; var lng = coordsArray[i].lng || coordsArray[i][1];
            var m = L.marker(L.latLng(lat, lng), { draggable: true, icon: L.AwesomeMarkers.icon({icon: 'circle', prefix: 'fa', markerColor: 'cyan'}) }).addTo(layerBlue);
            m.on('dragend', function() { window.updateDashboard(); }); 
            m.on('contextmenu', function(e) {
                if(markersBlue.length <= 2) { alert("Minimal 2 titik!"); return; }
                layerBlue.removeLayer(e.target); var idx = markersBlue.indexOf(e.target); if(idx > -1) markersBlue.splice(idx, 1);
                window.updateDashboard();
            });
            markersBlue.push(m);
        }
        markersBlue[0].setIcon(L.AwesomeMarkers.icon({icon:'ship', prefix:'fa', markerColor:'cyan'}));
        markersBlue[markersBlue.length-1].setIcon(L.AwesomeMarkers.icon({icon:'flag', prefix:'fa', markerColor:'green'}));
    }

    window.updateDashboard = function() {
        try {
            var faktor = parseFloat(document.getElementById('inp_faktor').value) || 51.07;
            var speed = parseFloat(document.getElementById('inp_speed').value) || 10;
            var stdHours = parseFloat(document.getElementById('inp_std_hours').value) || 0;
            var stdFaktor = parseFloat(document.getElementById('inp_std_faktor').value) || 0;
            var price = parseFloat(document.getElementById('inp_price').value) || 23000;
            var margin = parseFloat(document.getElementById('inp_margin').value) || 0;

            var res = { path: [], dist: 0 };
            for(var i=0; i<markersBlue.length; i++){
                res.path.push(markersBlue[i].getLatLng());
                if(i>0) res.dist += getDistNM(markersBlue[i-1].getLatLng().lat, markersBlue[i-1].getLatLng().lng, markersBlue[i].getLatLng().lat, markersBlue[i].getLatLng().lng);
            }
            lineBlue.setLatLngs(res.path);
            
            var durasiOW = res.dist / speed;
            var durasiPP = (res.dist * 2) / speed;
            
            var bbmMoving = (document.getElementById('sel_unit').value === 'lnm' ? (res.dist * 2) * faktor : durasiPP * faktor);
            var bbmStandby = stdHours * stdFaktor;
            var bbmTotal = bbmMoving + bbmStandby;

            var costReal = bbmTotal * price;
            var costMargin = costReal * (1 + (margin/100));

            if(document.getElementById('val_actual_speed')) document.getElementById('val_actual_speed').innerHTML = speed.toFixed(1) + " kn";
            if(document.getElementById('val_dur_ow')) document.getElementById('val_dur_ow').innerHTML = durasiOW.toFixed(1) + " h";
            if(document.getElementById('val_dur_pp')) document.getElementById('val_dur_pp').innerHTML = durasiPP.toFixed(1) + " h";
            if(document.getElementById('val_dist_ow')) document.getElementById('val_dist_ow').innerHTML = res.dist.toFixed(2) + " NM";
            if(document.getElementById('val_dist_pp')) document.getElementById('val_dist_pp').innerHTML = (res.dist * 2).toFixed(2) + " NM";
            if(document.getElementById('val_bbm_std')) document.getElementById('val_bbm_std').innerHTML = bbmStandby.toFixed(0) + " L";
            if(document.getElementById('val_bbm')) document.getElementById('val_bbm').innerHTML = Math.round(bbmTotal).toLocaleString('id-ID') + " L";
            if(document.getElementById('val_cost_real')) document.getElementById('val_cost_real').innerHTML = "Rp " + Math.round(costReal).toLocaleString('id-ID');
            if(document.getElementById('val_cost_margin')) document.getElementById('val_cost_margin').innerHTML = "Rp " + Math.round(costMargin).toLocaleString('id-ID');
        } catch(e) {}
    }

    L.control.layers({
        "Normal Mode": tile_layer_63218de02d7c1a737518aa8db7513f95,
        "Dark Mode": tile_layer_17e9de28213d403105f54974fc1b48ab
    }, {
        "🔵 Rute Simulasi": layerBlue
    }, {"position": "topright", "collapsed": false}).addTo(map_64192451556e7fad9e763d41da0e6805);

    // Double-click untuk tambah belokan manual
    lineBlue.on('dblclick', function(e){
        var minDistance = Infinity; var bestIdx = 1;
        for(var i=0; i<markersBlue.length-1; i++) {
            var dist = e.latlng.distanceTo(L.latLng((markersBlue[i].getLatLng().lat + markersBlue[i+1].getLatLng().lat)/2, (markersBlue[i].getLatLng().lng + markersBlue[i+1].getLatLng().lng)/2));
            if(dist < minDistance) { minDistance = dist; bestIdx = i+1; }
        }
        var newM = L.marker(e.latlng, { draggable: true, icon: L.AwesomeMarkers.icon({icon: 'circle', prefix: 'fa', markerColor: 'cyan'}) }).addTo(layerBlue);
        newM.on('dragend', function() { window.updateDashboard(); });
        newM.on('contextmenu', function(e) { layerBlue.removeLayer(newM); markersBlue.splice(markersBlue.indexOf(newM), 1); window.updateDashboard(); });
        markersBlue.splice(bestIdx, 0, newM); window.updateDashboard();
    });

</script>
