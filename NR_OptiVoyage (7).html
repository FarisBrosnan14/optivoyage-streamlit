                    <label style="cursor:pointer; display:flex; align-items:center;">

                    </label>
                    <label style="cursor:pointer; display:flex; align-items:center;">
                        <input type="checkbox" checked onchange="toggleKmlLayer('route_other', this.checked)" style="margin-right:8px;"> 🚢 Rute Lokal (Priok / Jawa Satu)
                    </label>
                    <label style="cursor:pointer; display:flex; align-items:center;">

                <div>

                    </div>
                    <div style="width:48%">

                    </div>
                </div>
            </div>

            var res = { path: [], dist: 0 };
            for(var i=0; i<markersBlue.length; i++){
                res.path.push(markersBlue[i].getLatLng());
                if(i>0) res.dist += getDistNM(markersBlue[i-1].getLatLng().lat, markersBlue[i-1].getLatLng().lng, markersBlue[i].getLatLng().lat, markersBlue[i].getLatLng().lng);
            }
            lineBlue.setLatLngs(res.path);
            
            var durasiPP = (res.dist * 2) / speed;
            var bbmTotal = (document.getElementById('sel_unit').value === 'lnm' ? (res.dist * 2) * faktor : durasiPP * faktor) + (stdHours * stdFaktor);
            var costReal = bbmTotal * (parseFloat(document.getElementById('inp_price').value) || 23000);

            document.getElementById('val_actual_speed').innerHTML = speed.toFixed(1) + " kn";
            document.getElementById('val_dur_ow').innerHTML = (res.dist / speed).toFixed(1) + " h";
            document.getElementById('val_dur_pp').innerHTML = durasiPP.toFixed(1) + " h";
            document.getElementById('val_dist_ow').innerHTML = res.dist.toFixed(2) + " NM";
            document.getElementById('val_dist_pp').innerHTML = (res.dist * 2).toFixed(2) + " NM";
            document.getElementById('val_bbm_std').innerHTML = (stdHours * stdFaktor).toFixed(0) + " L";
            document.getElementById('val_bbm').innerHTML = Math.round(bbmTotal).toLocaleString('id-ID') + " L";
            document.getElementById('val_cost_real').innerHTML = "Rp " + Math.round(costReal).toLocaleString('id-ID');
        } catch(e) { console.log(e.message); }
    }

    L.control.layers({
        "Normal Mode": tile_layer_63218de02d7c1a737518aa8db7513f95, // Diset urutan atas agar jadi Default di menu
        "Dark Mode": tile_layer_17e9de28213d403105f54974fc1b48ab
    }, {
        "🔵 Rute Simulasi": layerBlue
    }, {"position": "topright", "collapsed": false}).addTo(map_64192451556e7fad9e763d41da0e6805);

    // Fitur klik ganda untuk tambah titik tengah di lintasan
    lineBlue.on('dblclick', function(e){
        if(isLocked) { alert("Unlock First!"); return; }
        var minDistance = Infinity; var bestIdx = 1;
        for(var i=0; i<markersBlue.length-1; i++) {
            var dist = e.latlng.distanceTo(L.latLng((markersBlue[i].getLatLng().lat + markersBlue[i+1].getLatLng().lat)/2, (markersBlue[i].getLatLng().lng + markersBlue[i+1].getLatLng().lng)/2));
            if(dist < minDistance) { minDistance = dist; bestIdx = i+1; }
        }
        var newM = L.marker(e.latlng, { draggable: true, icon: L.AwesomeMarkers.icon({icon: 'circle', prefix: 'fa', markerColor: 'cyan'}) }).addTo(layerBlue);
        newM.on('dragend', function() { window.updateDashboard(); });
        newM.on('contextmenu', function(e) { layerBlue.removeLayer(newM); markersBlue.splice(markersBlue.indexOf(newM), 1); window.updateDashboard(); });
        markersBlue.splice(bestIdx, 0, newM); window.updateDashboard();
    });

</script>
</html>
